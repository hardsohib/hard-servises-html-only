<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      padding: 20px;
      transition: 0.3s;
    }

    body.light {
      background: linear-gradient(135deg, #f5f7fa, #dfe9f3);
      color: #111;
    }

    .wrapper {
      max-width: 1200px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .title {
      font-size: 30px;
      font-weight: bold;
    }

    .top-actions,
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn,
    .small-btn {
      border: none;
      padding: 11px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    body:not(.light) .btn {
      background: rgba(255,255,255,0.08);
      color: white;
      border: 1px solid rgba(255,255,255,0.08);
    }

    body.light .btn {
      background: white;
      color: #111;
      border: 1px solid rgba(0,0,0,0.08);
    }

    .small-btn {
      color: white;
    }

    .btn:hover,
    .small-btn:hover {
      transform: translateY(-2px);
    }

    .logout-btn {
      background: linear-gradient(135deg, #ef4444, #dc2626) !important;
      color: white !important;
    }

    .section {
      margin-bottom: 24px;
      padding: 20px;
      border-radius: 20px;
      backdrop-filter: blur(14px);
    }

    body:not(.light) .section {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }

    body.light .section {
      background: rgba(255,255,255,0.85);
      border: 1px solid rgba(0,0,0,0.08);
    }

    .section-title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 14px;
    }

    .search-box {
      margin-bottom: 16px;
    }

    .search-input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: none;
      outline: none;
      font-size: 15px;
    }

    body:not(.light) .search-input {
      background: rgba(255,255,255,0.06);
      color: white;
      border: 1px solid rgba(255,255,255,0.08);
    }

    body.light .search-input {
      background: white;
      color: #111;
      border: 1px solid rgba(0,0,0,0.08);
    }

    .list {
      display: grid;
      gap: 14px;
    }

    .card {
      padding: 16px;
      border-radius: 16px;
    }

    body:not(.light) .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.06);
    }

    body.light .card {
      background: rgba(255,255,255,0.98);
      border: 1px solid rgba(0,0,0,0.06);
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .user-name {
      font-size: 18px;
      font-weight: bold;
    }

    .muted {
      opacity: 0.8;
      font-size: 14px;
    }

    .balance-btn {
      background: linear-gradient(135deg, #22c55e, #16a34a);
    }

    .password-btn {
      background: linear-gradient(135deg, #f59e0b, #ea580c);
    }

    .info-btn {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
    }

    .approve-btn {
      background: linear-gradient(135deg, #22c55e, #16a34a);
    }

    .decline-btn {
      background: linear-gradient(135deg, #ef4444, #dc2626);
    }

    .status {
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      color: white;
      white-space: nowrap;
    }

    .progress {
      background: linear-gradient(135deg, #f59e0b, #d97706);
    }

    .completed {
      background: linear-gradient(135deg, #22c55e, #16a34a);
    }

    .declined {
      background: linear-gradient(135deg, #ef4444, #dc2626);
    }


    .checking {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
    }

    .message-input {
      width: 100%;
      min-height: 75px;
      padding: 12px 14px;
      border-radius: 12px;
      border: none;
      outline: none;
      resize: vertical;
      margin: 10px 0;
      font-size: 14px;
    }

    body:not(.light) .message-input {
      background: rgba(255,255,255,0.06);
      color: white;
      border: 1px solid rgba(255,255,255,0.08);
    }

    body.light .message-input {
      background: white;
      color: #111;
      border: 1px solid rgba(0,0,0,0.08);
    }


    .badge-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .badge {
      position: absolute;
      top: -9px;
      right: -9px;
      min-width: 22px;
      height: 22px;
      padding: 0 6px;
      border-radius: 999px;
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      font-size: 12px;
      font-weight: bold;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 14px rgba(239,68,68,0.35);
      z-index: 5;
    }

    .orders-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .orders-search {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: none;
      outline: none;
      font-size: 15px;
      margin-bottom: 16px;
    }

    body:not(.light) .orders-search {
      background: rgba(255,255,255,0.06);
      color: white;
      border: 1px solid rgba(255,255,255,0.08);
    }

    body.light .orders-search {
      background: white;
      color: #111;
      border: 1px solid rgba(0,0,0,0.08);
    }

    .orders-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .orders-column-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .delete-btn {
      background: linear-gradient(135deg, #991b1b, #ef4444);
    }

    @media (max-width: 900px) {
      .orders-grid {
        grid-template-columns: 1fr;
      }
    }


    .audio-player {
      width: 100%;
      margin: 10px 0;
    }

    .result-input {
      width: 100%;
      min-height: 75px;
      padding: 12px 14px;
      border-radius: 12px;
      border: none;
      outline: none;
      resize: vertical;
      margin: 10px 0;
      font-size: 14px;
    }

    body:not(.light) .result-input {
      background: rgba(255,255,255,0.06);
      color: white;
      border: 1px solid rgba(255,255,255,0.08);
    }

    body.light .result-input {
      background: white;
      color: #111;
      border: 1px solid rgba(0,0,0,0.08);
    }

    .theme-btn {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 1000;
    }

    .empty {
      opacity: 0.8;
      padding: 10px 0;
    }

    @media (max-width: 700px) {
      body {
        padding: 14px;
      }

      .title {
        font-size: 24px;
      }

      .actions,
      .top-actions {
        width: 100%;
      }

      .small-btn,
      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="topbar">
      <div class="title">Admin Panel</div>
      <div class="top-actions">
        <div class="badge-wrap">
          <button class="btn" onclick="document.getElementById('speakingTestsSection').scrollIntoView({behavior:'smooth'})">Speaking Tests</button>
          <span class="badge" id="speakingTestBadge">0</span>
        </div>
        <div class="badge-wrap">
          <button class="btn" onclick="document.getElementById('serviceOrdersSection').scrollIntoView({behavior:'smooth'})">Service Orders</button>
          <span class="badge" id="adminOrderBadge">0</span>
        </div>
        <button class="btn" onclick="window.location.href='services.html'">Back</button>
        <button class="btn logout-btn" onclick="logoutUser()">Logout</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Users</div>

      <div class="search-box">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Search by username or phone number"
        />
      </div>

      <div class="list" id="usersList">
        <div class="empty">Loading users...</div>
      </div>
    </div>



    <div class="section" id="serviceOrdersSection">
      <div class="orders-header">
        <div class="section-title">Service Orders</div>
        <div class="badge-wrap">
          <button class="btn" onclick="loadOrders()">Refresh Orders</button>
          <span class="badge" id="adminOrderBadge2">0</span>
        </div>
      </div>

      <input
        type="text"
        id="ordersSearchInput"
        class="orders-search"
        placeholder="Search orders by name, phone, service, status, or message"
      />

      <div class="orders-grid">
        <div>
          <div class="orders-column-title">Pending / Checking</div>
          <div class="list" id="pendingOrdersList">
            <div class="empty">Loading pending orders...</div>
          </div>
        </div>

        <div>
          <div class="orders-column-title">Completed / Cancelled</div>
          <div class="list" id="completedOrdersList">
            <div class="empty">Loading completed orders...</div>
          </div>
        </div>
      </div>
    </div>



    <div class="section" id="speakingTestsSection">
      <div class="orders-header">
        <div class="section-title">Speaking Test Submissions</div>
        <div class="badge-wrap">
          <button class="btn" onclick="loadSpeakingTests()">Refresh Tests</button>
          <span class="badge" id="speakingTestBadge2">0</span>
        </div>
      </div>

      <input
        type="text"
        id="speakingSearchInput"
        class="orders-search"
        placeholder="Search speaking tests by name, phone, video, status, or result"
      />

      <div class="list" id="speakingTestsList">
        <div class="empty">Loading speaking tests...</div>
      </div>
    </div>


    <div class="section">
      <div class="section-title">Deposits</div>
      <div class="list" id="depositsList">
        <div class="empty">Loading deposits...</div>
      </div>
    </div>
  </div>

  <button class="btn theme-btn" id="themeToggle">☀️ Theme</button>

  <script>
    const API_URL = "https://hard-service-buy-sell.onrender.com";
    const token = localStorage.getItem("token");
    const savedUser = JSON.parse(localStorage.getItem("user") || "{}");

    const usersList = document.getElementById("usersList");
    const depositsList = document.getElementById("depositsList");
    const pendingOrdersList = document.getElementById("pendingOrdersList");
    const completedOrdersList = document.getElementById("completedOrdersList");

    const themeToggle = document.getElementById("themeToggle");
    const body = document.body;
    const searchInput = document.getElementById("searchInput");
    const ordersSearchInput = document.getElementById("ordersSearchInput");

    const adminOrderBadge = document.getElementById("adminOrderBadge");
    const adminOrderBadge2 = document.getElementById("adminOrderBadge2");

    const speakingTestsList = document.getElementById("speakingTestsList");
    const speakingSearchInput = document.getElementById("speakingSearchInput");
    const speakingTestBadge = document.getElementById("speakingTestBadge");
    const speakingTestBadge2 = document.getElementById("speakingTestBadge2");

    let allUsers = [];
    let allOrders = [];
    let allSpeakingTests = [];

    if (!token) {
      window.location.href = "index.html";
    }

    if (savedUser.role !== "admin") {
      alert("Admin only.");
      window.location.href = "services.html";
    }

    themeToggle.addEventListener("click", () => {
      body.classList.toggle("light");
      themeToggle.textContent = body.classList.contains("light") ? "🌙 Theme" : "☀️ Theme";
    });

    function logoutUser() {
      const ok = confirm("Are you sure you want to logout?");
      if (ok) {
        localStorage.removeItem("token");
        localStorage.removeItem("user");
        window.location.href = "index.html";
      }
    }

    function getStatusClass(status) {
      if (status === "completed") return "completed";
      if (status === "declined" || status === "cancelled") return "declined";
      if (status === "checking" || status === "in_progress") return "checking";
      return "progress";
    }

    function getStatusText(status) {
      if (status === "completed") return "Completed";
      if (status === "declined" || status === "cancelled") return "Cancelled";
      if (status === "checking" || status === "in_progress") return "Checking";
      return "Pending";
    }

    function escapeValue(value) {
      return String(value || "")
        .replace(/\\/g, "\\\\")
        .replace(/'/g, "\\'")
        .replace(/"/g, "&quot;");
    }

    function renderUsers(users) {
      if (!users.length) {
        usersList.innerHTML = `<div class="empty">No users found.</div>`;
        return;
      }

      usersList.innerHTML = users.map(user => `
        <div class="card">
          <div class="row">
            <div>
              <div class="user-name">${user.name}</div>
              <div class="muted">${user.phone}</div>
            </div>
            <div>
              <div class="muted">Role: ${user.role}</div>
              <div class="muted">Balance: ${Number(user.balance).toLocaleString("en-US")} UZS</div>
            </div>
          </div>

          <div class="row">
            <div class="muted">Gmail: ${user.gmail || "-"}</div>
            <div class="muted">Telegram: ${user.telegram || "-"}</div>
          </div>

          <div class="actions">
            <button class="small-btn balance-btn" onclick="changeBalance(${user.id}, ${user.balance})">Change Balance</button>
            <button class="small-btn password-btn" onclick="changePassword(${user.id})">Reset Password</button>
            <button class="small-btn info-btn" onclick="changeConnections(${user.id}, '${escapeValue(user.name)}', '${escapeValue(user.phone)}', '${escapeValue(user.gmail)}', '${escapeValue(user.telegram)}')">Change Gmail / Telegram</button>
          </div>
        </div>
      `).join("");
    }

    async function loadUsers() {
      try {
        const response = await fetch(`${API_URL}/api/admin/users`, {
          headers: { "Authorization": `Bearer ${token}` }
        });

        const data = await response.json();

        if (!response.ok) {
          usersList.innerHTML = `<div class="empty">${data.message || "Failed to load users"}</div>`;
          return;
        }

        allUsers = data;
        renderUsers(allUsers);
      } catch (error) {
        usersList.innerHTML = `<div class="empty">Server error.</div>`;
      }
    }

    function updateAdminBadges(orders) {
      const count = orders.filter(order =>
        order.status === "pending" ||
        order.status === "checking" ||
        order.status === "in_progress"
      ).length;

      [adminOrderBadge, adminOrderBadge2].forEach(badge => {
        if (!badge) return;
        badge.textContent = count;
        badge.style.display = count > 0 ? "inline-flex" : "none";
      });
    }

    function orderMatchesSearch(order, value) {
      if (!value) return true;

      const text = [
        order.name,
        order.phone,
        order.gmail,
        order.telegram,
        order.service_name,
        order.status,
        order.admin_message,
        order.price
      ].join(" ").toLowerCase();

      return text.includes(value);
    }

    function renderOrders() {
      const value = (ordersSearchInput.value || "").trim().toLowerCase();
      const filtered = allOrders.filter(order => orderMatchesSearch(order, value));

      const activeOrders = filtered.filter(order =>
        order.status === "pending" ||
        order.status === "checking" ||
        order.status === "in_progress"
      );

      const doneOrders = filtered.filter(order =>
        order.status === "completed" ||
        order.status === "cancelled" ||
        order.status === "declined"
      );

      renderOrderList(pendingOrdersList, activeOrders, "No pending/checking orders.");
      renderOrderList(completedOrdersList, doneOrders, "No completed/cancelled orders.");
      updateAdminBadges(allOrders);
    }

    function renderOrderList(container, orders, emptyText) {
      if (!orders.length) {
        container.innerHTML = `<div class="empty">${emptyText}</div>`;
        return;
      }

      container.innerHTML = orders.map(order => `
        <div class="card">
          <div class="row">
            <div>
              <div class="user-name">${order.service_name || "Service"}</div>
              <div class="muted">Buyer: ${order.name || "-"} • ${order.phone || "-"}</div>
            </div>
            <div>
              <div class="muted">${Number(order.price || 0).toLocaleString("en-US")} UZS</div>
              <div class="status ${getStatusClass(order.status)}">${getStatusText(order.status)}</div>
            </div>
          </div>

          <div class="row">
            <div class="muted">Gmail: ${order.gmail || "-"}</div>
            <div class="muted">Telegram: ${order.telegram || "-"}</div>
          </div>

          <div class="muted">Bought: ${new Date(order.created_at).toLocaleString()}</div>

          <textarea class="message-input" id="message-${order.id}" placeholder="Example: You bought Speaking Test service and your score is 6.">${order.admin_message || ""}</textarea>

          <div class="actions">
            <button class="small-btn info-btn" onclick="updateOrder(${order.id}, 'checking')">Mark Checking</button>
            <button class="small-btn approve-btn" onclick="updateOrder(${order.id}, 'completed')">Send Result / Complete</button>
            <button class="small-btn decline-btn" onclick="updateOrder(${order.id}, 'cancelled')">Cancel</button>
            <button class="small-btn delete-btn" onclick="deleteOrder(${order.id})">Delete</button>
          </div>
        </div>
      `).join("");
    }

    async function loadOrders() {
      try {
        const response = await fetch(`${API_URL}/api/admin/orders`, {
          headers: { "Authorization": `Bearer ${token}` }
        });

        const data = await response.json();

        if (!response.ok) {
          pendingOrdersList.innerHTML = `<div class="empty">${data.message || "Failed to load service orders"}</div>`;
          completedOrdersList.innerHTML = `<div class="empty">No data.</div>`;
          return;
        }

        allOrders = data;
        renderOrders();
      } catch (error) {
        pendingOrdersList.innerHTML = `<div class="empty">Backend route needed: /api/admin/orders</div>`;
        completedOrdersList.innerHTML = `<div class="empty">Server error.</div>`;
      }
    }

    async function updateOrder(orderId, status) {
      const admin_message = document.getElementById(`message-${orderId}`).value.trim();

      try {
        const response = await fetch(`${API_URL}/api/admin/order/${orderId}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({ status, admin_message })
        });

        const data = await response.json();

        if (!response.ok) {
          alert(data.message || "Failed to update order.");
          return;
        }

        alert(data.message || "Order updated.");
        loadOrders();
    loadSpeakingTests();
      } catch (error) {
        alert("Backend route needed: /api/admin/order/:id");
      }
    }

    async function deleteOrder(orderId) {
      const ok = confirm("Delete this service order?");
      if (!ok) return;

      try {
        const response = await fetch(`${API_URL}/api/admin/order/${orderId}`, {
          method: "DELETE",
          headers: { "Authorization": `Bearer ${token}` }
        });

        const data = await response.json();

        if (!response.ok) {
          alert(data.message || "Failed to delete order.");
          return;
        }

        alert(data.message || "Order deleted.");
        loadOrders();
    loadSpeakingTests();
      } catch (error) {
        alert("Backend route needed: DELETE /api/admin/order/:id");
      }
    }


    function updateSpeakingBadges(tests) {
      const count = tests.filter(test => test.status === "pending" || test.status === "checking").length;

      [speakingTestBadge, speakingTestBadge2].forEach(badge => {
        if (!badge) return;
        badge.textContent = count;
        badge.style.display = count > 0 ? "inline-flex" : "none";
      });
    }

    function speakingMatchesSearch(test, value) {
      if (!value) return true;

      const text = [
        test.full_name,
        test.user_name,
        test.phone,
        test.gmail,
        test.telegram,
        test.video_name,
        test.status,
        test.result_message,
        test.created_at
      ].join(" ").toLowerCase();

      return text.includes(value);
    }

    function renderSpeakingTests() {
      const value = (speakingSearchInput.value || "").trim().toLowerCase();
      const filtered = allSpeakingTests.filter(test => speakingMatchesSearch(test, value));

      if (!filtered.length) {
        speakingTestsList.innerHTML = `<div class="empty">No speaking tests found.</div>`;
        updateSpeakingBadges(allSpeakingTests);
        return;
      }

      speakingTestsList.innerHTML = filtered.map(test => `
        <div class="card">
          <div class="row">
            <div>
              <div class="user-name">${test.full_name || test.user_name || "-"}</div>
              <div class="muted">Account: ${test.user_name || "-"} • ${test.phone || "-"}</div>
            </div>
            <div>
              <div class="muted">Video: ${test.video_name || "-"}</div>
              <div class="status ${getStatusClass(test.status)}">${getStatusText(test.status)}</div>
            </div>
          </div>

          <div class="row">
            <div class="muted">Gmail: ${test.gmail || "-"}</div>
            <div class="muted">Telegram: ${test.telegram || "-"}</div>
          </div>

          <div class="muted">Submitted: ${new Date(test.created_at).toLocaleString()}</div>

          <audio class="audio-player" controls src="${API_URL}${test.audio_url}"></audio>

          <textarea class="result-input" id="speaking-result-${test.id}" placeholder="Example: Your speaking score is 6.0. Work on fluency and pronunciation.">${test.result_message || ""}</textarea>

          <div class="actions">
            <button class="small-btn info-btn" onclick="updateSpeakingTest(${test.id}, 'checking')">Mark Checking</button>
            <button class="small-btn approve-btn" onclick="updateSpeakingTest(${test.id}, 'completed')">Send Result</button>
            <button class="small-btn decline-btn" onclick="updateSpeakingTest(${test.id}, 'declined')">Decline</button>
            <button class="small-btn delete-btn" onclick="deleteSpeakingTest(${test.id})">Delete</button>
          </div>
        </div>
      `).join("");

      updateSpeakingBadges(allSpeakingTests);
    }

    async function loadSpeakingTests() {
      try {
        const response = await fetch(`${API_URL}/api/admin/speaking-tests`, {
          headers: { "Authorization": `Bearer ${token}` }
        });

        const data = await response.json();

        if (!response.ok) {
          speakingTestsList.innerHTML = `<div class="empty">${data.message || "Failed to load speaking tests"}</div>`;
          return;
        }

        allSpeakingTests = data;
        renderSpeakingTests();
      } catch (error) {
        speakingTestsList.innerHTML = `<div class="empty">Backend route needed: /api/admin/speaking-tests</div>`;
      }
    }

    async function updateSpeakingTest(testId, status) {
      const result_message = document.getElementById(`speaking-result-${testId}`).value.trim();

      try {
        const response = await fetch(`${API_URL}/api/admin/speaking-test/${testId}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({ status, result_message })
        });

        const data = await response.json();

        if (!response.ok) {
          alert(data.message || "Failed to update speaking test.");
          return;
        }

        alert(data.message || "Speaking test updated.");
        loadSpeakingTests();
      } catch (error) {
        alert("Backend route needed: /api/admin/speaking-test/:id");
      }
    }

    async function deleteSpeakingTest(testId) {
      const ok = confirm("Delete this speaking test and its audio?");
      if (!ok) return;

      try {
        const response = await fetch(`${API_URL}/api/admin/speaking-test/${testId}`, {
          method: "DELETE",
          headers: { "Authorization": `Bearer ${token}` }
        });

        const data = await response.json();

        if (!response.ok) {
          alert(data.message || "Failed to delete speaking test.");
          return;
        }

        alert(data.message || "Speaking test deleted.");
        loadSpeakingTests();
      } catch (error) {
        alert("Backend route needed: DELETE /api/admin/speaking-test/:id");
      }
    }


    async function loadDeposits() {
      try {
        const response = await fetch(`${API_URL}/api/admin/deposits`, {
          headers: { "Authorization": `Bearer ${token}` }
        });

        const data = await response.json();

        if (!response.ok) {
          depositsList.innerHTML = `<div class="empty">${data.message || "Failed to load deposits"}</div>`;
          return;
        }

        if (!data.length) {
          depositsList.innerHTML = `<div class="empty">No deposits found.</div>`;
          return;
        }

        depositsList.innerHTML = data.map(item => `
          <div class="card">
            <div class="row">
              <div>
                <div class="user-name">${item.name}</div>
                <div class="muted">${item.phone}</div>
              </div>
              <div>
                <div class="muted">${Number(item.amount).toLocaleString("en-US")} UZS</div>
                <div class="muted">${item.method}</div>
              </div>
            </div>

            <div class="row">
              <div class="muted">${new Date(item.created_at).toLocaleString()}</div>
              <div class="status ${getStatusClass(item.status)}">${getStatusText(item.status)}</div>
            </div>

            <div class="actions">
              <button class="small-btn approve-btn" onclick="updateDepositStatus(${item.id}, 'completed')">Approve</button>
              <button class="small-btn decline-btn" onclick="updateDepositStatus(${item.id}, 'declined')">Decline</button>
            </div>
          </div>
        `).join("");
      } catch (error) {
        depositsList.innerHTML = `<div class="empty">Server error.</div>`;
      }
    }

    async function changeBalance(userId, currentBalance) {
      const value = prompt("Enter new balance:", currentBalance);
      if (value === null) return;

      const balance = Number(value);
      if (isNaN(balance) || balance < 0) {
        alert("Invalid balance.");
        return;
      }

      try {
        const response = await fetch(`${API_URL}/api/admin/user/${userId}/balance`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({ balance })
        });

        const data = await response.json();

        if (!response.ok) {
          alert(data.message || "Failed to update balance.");
          return;
        }

        alert("Balance updated.");
        loadUsers();
      } catch (error) {
        alert("Server error.");
      }
    }

    async function changePassword(userId) {
      const password = prompt("Enter new password (minimum 8 characters):");
      if (password === null) return;

      if (password.length < 8) {
        alert("Password must be at least 8 characters.");
        return;
      }

      try {
        const response = await fetch(`${API_URL}/api/admin/user/${userId}/password`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({ password })
        });

        const data = await response.json();

        if (!response.ok) {
          alert(data.message || "Failed to update password.");
          return;
        }

        alert("Password updated.");
      } catch (error) {
        alert("Server error.");
      }
    }

    async function changeConnections(userId, currentName, currentPhone, currentGmail, currentTelegram) {
      const gmail = prompt("Enter new Gmail:", currentGmail);
      if (gmail === null) return;

      const telegram = prompt("Enter new Telegram:", currentTelegram);
      if (telegram === null) return;

      if (gmail.trim() && !gmail.includes("@")) {
        alert("Enter a valid Gmail.");
        return;
      }

      if (telegram.trim() && !telegram.startsWith("@")) {
        alert("Telegram username must start with @");
        return;
      }

      try {
        const response = await fetch(`${API_URL}/api/admin/user/${userId}/info`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({
            name: currentName,
            phone: currentPhone,
            gmail: gmail.trim(),
            telegram: telegram.trim()
          })
        });

        const data = await response.json();

        if (!response.ok) {
          alert(data.message || "Failed to update info.");
          return;
        }

        alert("Gmail and Telegram updated.");
        loadUsers();
      } catch (error) {
        alert("Server error.");
      }
    }

    async function updateDepositStatus(depositId, status) {
      try {
        const response = await fetch(`${API_URL}/api/admin/deposit/${depositId}/status`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({ status })
        });

        const data = await response.json();

        if (!response.ok) {
          alert(data.message || "Failed to update deposit.");
          return;
        }

        alert(data.message || "Deposit updated.");
        loadDeposits();
        loadUsers();
      } catch (error) {
        alert("Server error.");
      }
    }

    searchInput.addEventListener("input", () => {
      const value = searchInput.value.trim().toLowerCase();

      const filteredUsers = allUsers.filter(user => {
        const name = (user.name || "").toLowerCase();
        const phone = (user.phone || "").toLowerCase();
        return name.includes(value) || phone.includes(value);
      });

      renderUsers(filteredUsers);
    });

    ordersSearchInput.addEventListener("input", renderOrders);
    speakingSearchInput.addEventListener("input", renderSpeakingTests);

    loadUsers();
    loadDeposits();
    loadOrders();
    loadSpeakingTests();

    setInterval(loadOrders, 30000);
    setInterval(loadSpeakingTests, 30000);
  </script>
</body>
</html>
