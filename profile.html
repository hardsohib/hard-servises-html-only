<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      transition: 0.4s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    body.dark {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
    }

    body.light {
      background: linear-gradient(135deg, #f5f7fa, #dfe9f3);
      color: #111;
    }

    .container {
      width: 100%;
      max-width: 520px;
      border-radius: 24px;
      padding: 26px;
      backdrop-filter: blur(18px);
      animation: fadeUp 0.7s ease;
    }

    body.dark .container {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    body.light .container {
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      gap: 10px;
    }

    .back-btn,
    .theme-btn,
    .save-btn,
    .change-pass-btn,
    .small-btn {
      border: none;
      padding: 9px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    body.dark .back-btn,
    body.dark .theme-btn,
    body.dark .small-btn {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.08);
    }

    body.light .back-btn,
    body.light .theme-btn,
    body.light .small-btn {
      background: #fff;
      color: #111;
      border: 1px solid rgba(0,0,0,0.08);
    }

    .profile {
      text-align: center;
      margin-bottom: 22px;
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
      margin: auto;
      color: white;
      margin-bottom: 14px;
      box-shadow: 0 10px 25px rgba(99,102,241,0.4);
    }

    .name-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    .name {
      font-size: 22px;
      font-weight: bold;
      word-break: break-word;
    }

    .edit-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 15px;
      transition: 0.3s;
      background: linear-gradient(135deg, #3b82f6, #9333ea);
      color: white;
      box-shadow: 0 6px 18px rgba(59,130,246,0.28);
    }

    .edit-btn:hover,
    .back-btn:hover,
    .theme-btn:hover,
    .save-btn:hover,
    .change-pass-btn:hover,
    .small-btn:hover {
      transform: translateY(-2px);
    }

    .name-edit-wrap {
      display: none;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .name-edit-wrap input {
      padding: 11px 14px;
      border-radius: 12px;
      border: none;
      outline: none;
      min-width: 220px;
    }

    body.dark .name-edit-wrap input,
    body.dark .connection-input {
      background: rgba(255,255,255,0.06);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.08);
    }

    body.light .name-edit-wrap input,
    body.light .connection-input {
      background: #fff;
      color: #111;
      border: 1px solid rgba(0,0,0,0.08);
    }

    .phone {
      font-size: 14px;
      opacity: 0.8;
    }

    .section {
      margin-top: 18px;
      padding: 16px;
      border-radius: 16px;
    }

    body.dark .section {
      background: rgba(255,255,255,0.05);
    }

    body.light .section {
      background: rgba(255,255,255,0.85);
    }

    .section-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 14px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      gap: 15px;
      margin-bottom: 10px;
      font-size: 15px;
      flex-wrap: wrap;
    }

    .balance {
      font-weight: bold;
      font-size: 18px;
      margin-top: 8px;
      text-align: center;
    }

    .change-pass-btn {
      width: 100%;
      margin-top: 12px;
      background: linear-gradient(135deg, #f59e0b, #ea580c);
      color: white;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding: 12px 14px;
      border-radius: 12px;
      flex-wrap: wrap;
    }

    body.dark .history-item {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.06);
    }

    body.light .history-item {
      background: rgba(255,255,255,0.95);
      border: 1px solid rgba(0,0,0,0.06);
    }

    .history-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .history-title {
      font-weight: bold;
      font-size: 15px;
    }

    .history-date {
      opacity: 0.75;
      font-size: 13px;
    }

    .history-amount {
      font-weight: bold;
      color: #22c55e;
    }

    .connections-box {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .connection-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: bold;
    }

    .connection-input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      outline: none;
    }

    .save-btn {
      width: 100%;
      margin-top: 6px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
    }

    .actions {
      margin-top: 22px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      padding: 12px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .deposit-btn {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
    }

    .logout-btn {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
    }

    .note {
      font-size: 13px;
      opacity: 0.8;
      margin-top: 8px;
      line-height: 1.5;
    }

    @media (max-width: 480px) {
      body {
        padding: 12px;
        align-items: flex-start;
      }

      .container {
        padding: 18px;
      }

      .avatar {
        width: 78px;
        height: 78px;
        font-size: 24px;
      }

      .name {
        font-size: 20px;
      }

      .top {
        flex-wrap: wrap;
      }

      .back-btn,
      .theme-btn {
        flex: 1;
      }

      .name-edit-wrap input {
        width: 100%;
        min-width: 0;
      }
    }
  </style>
</head>
<body class="dark">

  <div class="container">

    <div class="top">
      <button class="back-btn" onclick="window.location.href='services.html'">← Back</button>
      <button class="theme-btn" id="themeToggle">Theme</button>
    </div>

    <div class="profile">
      <div class="avatar" id="avatar">F</div>

      <div class="name-row">
        <div class="name" id="name">Faredun</div>
        <button class="edit-btn" onclick="toggleNameEdit()">✏️</button>
      </div>

      <div class="name-edit-wrap" id="nameEditWrap">
        <input type="text" id="nameInput" placeholder="Enter new name" maxlength="30">
        <button class="small-btn" onclick="saveName()">Save</button>
      </div>

      <div class="phone" id="phone">+998 90 123 45 67</div>
    </div>

    <div class="section">
      <div class="section-title">Account Info</div>
      <div class="info-row">
        <span>Status</span>
        <span>Active</span>
      </div>
      <div class="info-row">
        <span>User ID</span>
        <span>#001</span>
      </div>
      <div class="info-row">
        <span>Phone Number</span>
        <span id="actualPhone">+998 90 123 45 67</span>
      </div>
      <div class="balance">
        Balance: <span id="balance">0</span> UZS
      </div>

      <button class="change-pass-btn" onclick="window.open('https://t.me/Sohapro', '_blank')">
        Change Password via Admin
      </button>
      <div class="note">
        To change your password, contact admin in Telegram.
      </div>
    </div>

    <div class="section">
      <div class="section-title">Connections Links</div>
      <div class="connections-box">
        <div class="connection-group">
          <label for="gmailInput">Gmail</label>
          <input class="connection-input" id="gmailInput" type="email" placeholder="example@gmail.com">
        </div>

        <div class="connection-group">
          <label for="telegramInput">Telegram</label>
          <input class="connection-input" id="telegramInput" type="text" placeholder="@username">
        </div>

        <button class="save-btn" onclick="saveConnections()">Save Connections</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Deposit History</div>
      <div class="history-list" id="historyList">
        <div class="history-item">
          <div class="history-left">
            <div class="history-title">No deposits yet</div>
            <div class="history-date">Your deposit history will appear here</div>
          </div>
          <div class="history-amount">0 UZS</div>
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="btn deposit-btn" onclick="window.location.href='deposit.html'">Deposit</button>
      <button class="btn logout-btn" onclick="logoutUser()">Logout</button>
    </div>

  </div>

  <script>
   const API_URL = "http://localhost:5000";
  const themeToggle = document.getElementById("themeToggle");
  const body = document.body;

  const token = localStorage.getItem("token");

  const avatarEl = document.getElementById("avatar");
  const nameEl = document.getElementById("name");
  const phoneEl = document.getElementById("phone");
  const actualPhoneEl = document.getElementById("actualPhone");
  const balanceEl = document.getElementById("balance");

  const nameInput = document.getElementById("nameInput");
  const nameEditWrap = document.getElementById("nameEditWrap");

  const gmailInput = document.getElementById("gmailInput");
  const telegramInput = document.getElementById("telegramInput");

  if (!token) {
    window.location.href = "index.html";
  }

  themeToggle.addEventListener("click", () => {
    body.classList.toggle("dark");
    body.classList.toggle("light");
  });

  async function loadProfile() {
    try {
      const response = await fetch(`${API_URL}/api/profile/me`, {
        method: "GET",
        headers: {
          "Authorization": `Bearer ${token}`
        }
      });

      const data = await response.json();

      if (!response.ok) {
        localStorage.removeItem("token");
        localStorage.removeItem("user");
        window.location.href = "index.html";
        return;
      }

      nameEl.textContent = data.name;
      phoneEl.textContent = data.phone;
      actualPhoneEl.textContent = data.phone;
      balanceEl.textContent = Number(data.balance).toLocaleString("en-US");
      gmailInput.value = data.gmail || "";
      telegramInput.value = data.telegram || "";
      avatarEl.textContent = data.name.charAt(0).toUpperCase();

      localStorage.setItem("user", JSON.stringify(data));
    } catch (error) {
      console.error("Profile load error:", error);
      alert("Failed to load profile.");
    }
  }

  function toggleNameEdit() {
    if (nameEditWrap.style.display === "flex") {
      nameEditWrap.style.display = "none";
    } else {
      nameEditWrap.style.display = "flex";
      nameInput.value = nameEl.textContent.trim();
      nameInput.focus();
    }
  }

  async function saveName() {
    const newName = nameInput.value.trim();

    if (newName.length < 2) {
      alert("Name must be at least 2 characters.");
      return;
    }

    try {
      const response = await fetch(`${API_URL}/api/profile/update`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify({
          name: newName,
          gmail: gmailInput.value.trim(),
          telegram: telegramInput.value.trim()
        })
      });

      const data = await response.json();

      if (!response.ok) {
        alert(data.message || "Failed to update name.");
        return;
      }

      nameEditWrap.style.display = "none";
      await loadProfile();
      alert("Name updated successfully.");
    } catch (error) {
      alert("Server error.");
    }
  }

  async function saveConnections() {
    const newName = nameEl.textContent.trim();
    const gmail = gmailInput.value.trim();
    const telegram = telegramInput.value.trim();

    if (gmail && !gmail.includes("@")) {
      alert("Enter a valid Gmail.");
      return;
    }

    if (telegram && !telegram.startsWith("@")) {
      alert("Telegram username must start with @");
      return;
    }

    try {
      const response = await fetch(`${API_URL}/api/profile/update`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify({
          name: newName,
          gmail,
          telegram
        })
      });

      const data = await response.json();

      if (!response.ok) {
        alert(data.message || "Failed to save connections.");
        return;
      }

      await loadProfile();
      alert("Connections saved successfully.");
    } catch (error) {
      alert("Server error.");
    }
  }

  function logoutUser() {
    const confirmLogout = confirm("Are you sure you want to logout?");
    if (confirmLogout) {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location.href = "index.html";
    }
  }

  loadProfile();
  </script>

</body>
</html>
