<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login / Register</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.4s ease;
      overflow: hidden;
    }

    body.light {
      background: linear-gradient(135deg, #f5f7fa, #dfe9f3);
      color: #111;
    }

    body.dark {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
    }

    .background-blur {
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.35;
      animation: float 8s ease-in-out infinite;
    }

    .blur1 {
      background: #3b82f6;
      top: 10%;
      left: 10%;
    }

    .blur2 {
      background: #9333ea;
      bottom: 10%;
      right: 10%;
      animation-delay: 2s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) translateX(0px); }
      50% { transform: translateY(-20px) translateX(15px); }
    }

    .container {
      position: relative;
      width: 390px;
      max-width: 95%;
      padding: 30px;
      border-radius: 24px;
      backdrop-filter: blur(18px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      z-index: 2;
      animation: fadeUp 0.8s ease;
    }

    body.light .container {
      background: rgba(255, 255, 255, 0.65);
      border: 1px solid rgba(255,255,255,0.4);
    }

    body.dark .container {
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid rgba(255,255,255,0.08);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(25px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
    }

    .title {
      font-size: 26px;
      font-weight: bold;
    }

    .theme-toggle {
      border: none;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }

    body.light .theme-toggle {
      background: #111827;
      color: #fff;
    }

    body.dark .theme-toggle {
      background: #f8fafc;
      color: #111;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 22px;
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    body.light .tab-btn {
      background: #e5e7eb;
      color: #111;
    }

    body.dark .tab-btn {
      background: #1e293b;
      color: #fff;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #3b82f6, #9333ea);
      color: white;
    }

    .form-box {
      display: none;
      animation: fadeIn 0.35s ease;
    }

    .form-box.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateX(10px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      margin-bottom: 7px;
      font-size: 14px;
      font-weight: bold;
    }

    .input-group input {
      width: 100%;
      padding: 14px 14px;
      border-radius: 14px;
      border: none;
      outline: none;
      font-size: 15px;
      transition: 0.3s;
    }

    body.light .input-group input {
      background: rgba(255,255,255,0.9);
      color: #111;
      border: 1px solid #d1d5db;
    }

    body.dark .input-group input {
      background: rgba(255,255,255,0.06);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .input-group input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }

    .password-wrap {
      position: relative;
    }

    .show-pass-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      color: #3b82f6;
      padding: 4px 6px;
    }

    .password-wrap input {
      padding-right: 70px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    .remember input {
      accent-color: #3b82f6;
      width: 16px;
      height: 16px;
    }

    .forgot {
      text-decoration: none;
      color: #3b82f6;
      font-size: 14px;
      font-weight: bold;
    }

    .forgot:hover {
      text-decoration: underline;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #3b82f6, #9333ea);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 10px 25px rgba(59,130,246,0.25);
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(59,130,246,0.35);
    }

    .bottom-text {
      margin-top: 18px;
      text-align: center;
      font-size: 14px;
      opacity: 0.85;
    }

    .error-message {
      color: #ff6b6b;
      font-size: 13px;
      margin-top: -6px;
      margin-bottom: 12px;
      display: none;
    }

    @media (max-width: 480px) {
      .container {
        padding: 22px;
      }

      .title {
        font-size: 22px;
      }
    }
  </style>
</head>
<body class="dark">
  <div class="background-blur blur1"></div>
  <div class="background-blur blur2"></div>

  <div class="container">
    <div class="top-bar">
      <div class="title">Welcome</div>
      <button class="theme-toggle" id="themeToggle">☀️</button>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="showForm('login')">Login</button>
      <button class="tab-btn" onclick="showForm('register')">Register</button>
    </div>

    <!-- Login Form -->
    <form class="form-box active" id="loginForm">
      <div class="input-group">
        <label>Phone Number</label>
        <input type="text" id="loginPhone" placeholder="+998 90 123 45 67" maxlength="17" />
      </div>

      <div class="input-group">
        <label>Password</label>
        <div class="password-wrap">
          <input type="password" id="loginPassword" placeholder="Enter password" required />
          <button type="button" class="show-pass-btn" onclick="togglePassword('loginPassword', this)">Show</button>
        </div>
      </div>

      <div class="error-message" id="loginError"></div>

      <div class="row">
        <label class="remember">
          <input type="checkbox" />
          Remember me
        </label>
        <a href="https://t.me/Sohapro" target="_blank" class="forgot">Forget password?</a>
      </div>

      <button type="submit" class="submit-btn">Login</button>
      <div class="bottom-text">Access your account securely</div>
    </form>

    <!-- Register Form -->
    <form class="form-box" id="registerForm">
      <div class="input-group">
        <label>Full Name</label>
        <input type="text" placeholder="Enter your name" required />
      </div>

      <div class="input-group">
        <label>Phone Number</label>
        <input type="text" id="registerPhone" placeholder="+998 90 123 45 67" maxlength="17" />
      </div>

      <div class="input-group">
        <label>Password</label>
        <div class="password-wrap">
          <input type="password" id="registerPassword" placeholder="Create password" required />
          <button type="button" class="show-pass-btn" onclick="togglePassword('registerPassword', this)">Show</button>
        </div>
      </div>

      <div class="input-group">
        <label>Confirm Password</label>
        <div class="password-wrap">
          <input type="password" id="confirmPassword" placeholder="Confirm password" required />
          <button type="button" class="show-pass-btn" onclick="togglePassword('confirmPassword', this)">Show</button>
        </div>
      </div>

      <div class="error-message" id="registerError"></div>

      <div class="row">
        <label class="remember">
          <input type="checkbox" />
          Remember me
        </label>
      </div>

      <button type="submit" class="submit-btn">Register</button>
      <div class="bottom-text">Create your account in seconds</div>
    </form>
  </div>

  <script>
    const API_URL = "https://hard-service-buy-sell.onrender.com";
    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");
    const tabButtons = document.querySelectorAll(".tab-btn");
    const themeToggle = document.getElementById("themeToggle");
    const body = document.body;

    const loginPhone = document.getElementById("loginPhone");
    const registerPhone = document.getElementById("registerPhone");
    const loginPassword = document.getElementById("loginPassword");
    const registerPassword = document.getElementById("registerPassword");
    const confirmPassword = document.getElementById("confirmPassword");
    const loginError = document.getElementById("loginError");
    const registerError = document.getElementById("registerError");

    
    

    function showForm(type) {
      loginError.style.display = "none";
      registerError.style.display = "none";

      if (type === "login") {
        loginForm.classList.add("active");
        registerForm.classList.remove("active");
        tabButtons[0].classList.add("active");
        tabButtons[1].classList.remove("active");
      } else {
        registerForm.classList.add("active");
        loginForm.classList.remove("active");
        tabButtons[1].classList.add("active");
        tabButtons[0].classList.remove("active");
      }
    }

    themeToggle.addEventListener("click", () => {
      body.classList.toggle("dark");
      body.classList.toggle("light");

      if (body.classList.contains("dark")) {
        themeToggle.textContent = "☀️";
      } else {
        themeToggle.textContent = "🌙";
      }
    });

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);

      if (input.type === "password") {
        input.type = "text";
        btn.textContent = "Hide";
      } else {
        input.type = "password";
        btn.textContent = "Show";
      }
    }

    function formatUzPhone(input) {
      let numbers = input.value.replace(/\D/g, "");

      if (!numbers.startsWith("998")) {
        numbers = "998" + numbers.replace(/^998/, "");
      }

      numbers = numbers.slice(0, 12);

      let formatted = "+998";

      if (numbers.length > 3) {
        formatted += " " + numbers.slice(3, 5);
      }
      if (numbers.length > 5) {
        formatted += " " + numbers.slice(5, 8);
      }
      if (numbers.length > 8) {
        formatted += " " + numbers.slice(8, 10);
      }
      if (numbers.length > 10) {
        formatted += " " + numbers.slice(10, 12);
      }

      input.value = formatted;
    }

    function setDefaultPhone(input) {
      if (!input.value.trim()) {
        input.value = "+998 ";
      }
    }

    [loginPhone, registerPhone].forEach(input => {
      input.addEventListener("focus", () => setDefaultPhone(input));
      input.addEventListener("input", () => formatUzPhone(input));

      input.addEventListener("keydown", (e) => {
        if ((input.selectionStart <= 5) &&
            (e.key === "Backspace" || e.key === "Delete")) {
          e.preventDefault();
        }
      });
    });

    loginForm.addEventListener("submit", async function(e) {
  e.preventDefault();
  loginError.style.display = "none";

  const phoneDigits = loginPhone.value.replace(/\D/g, "");
  const fullPhone = "+" + phoneDigits;

  if (phoneDigits.length !== 12 || !phoneDigits.startsWith("998")) {
    loginError.textContent = "Phone number must be a valid Uzbekistan number.";
    loginError.style.display = "block";
    return;
  }

  if (loginPassword.value.length < 8) {
    loginError.textContent = "Password must be at least 8 characters.";
    loginError.style.display = "block";
    return;
  }

  try {
    const response = await fetch(`${API_URL}/api/auth/login`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        phone: fullPhone,
        password: loginPassword.value
      })
    });

    const data = await response.json();

    if (!response.ok) {
      loginError.textContent = data.message || "Login failed.";
      loginError.style.display = "block";
      return;
    }

    localStorage.setItem("token", data.token);
    localStorage.setItem("user", JSON.stringify(data.user));

    window.location.href = "services.html";
  } catch (error) {
    loginError.textContent = "Server error. Try again.";
    loginError.style.display = "block";
  }
});

registerForm.addEventListener("submit", async function(e) {
  e.preventDefault();
  registerError.style.display = "none";

  const nameInput = registerForm.querySelector('input[type="text"]');
  const fullName = nameInput.value.trim();
  const phoneDigits = registerPhone.value.replace(/\D/g, "");
  const fullPhone = "+" + phoneDigits;

  if (!fullName) {
    registerError.textContent = "Name is required.";
    registerError.style.display = "block";
    return;
  }

  if (phoneDigits.length !== 12 || !phoneDigits.startsWith("998")) {
    registerError.textContent = "Phone number must be a valid Uzbekistan number.";
    registerError.style.display = "block";
    return;
  }

  if (registerPassword.value.length < 8) {
    registerError.textContent = "Password must be at least 8 characters.";
    registerError.style.display = "block";
    return;
  }

  if (registerPassword.value !== confirmPassword.value) {
    registerError.textContent = "Passwords do not match.";
    registerError.style.display = "block";
    return;
  }

  try {
    const response = await fetch(`${API_URL}/api/auth/register`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name: fullName,
        phone: fullPhone,
        password: registerPassword.value
      })
    });

    const data = await response.json();

    if (!response.ok) {
      registerError.textContent = data.message || "Register failed.";
      registerError.style.display = "block";
      return;
    }

    const loginResponse = await fetch(`${API_URL}/api/auth/login`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        phone: fullPhone,
        password: registerPassword.value
      })
    });

    const loginData = await loginResponse.json();

    if (!loginResponse.ok) {
      registerError.textContent = "Registered, but auto login failed.";
      registerError.style.display = "block";
      return;
    }

    localStorage.setItem("token", loginData.token);
    localStorage.setItem("user", JSON.stringify(loginData.user));

    window.location.href = "services.html";
  } catch (error) {
    registerError.textContent = "Server error. Try again.";
    registerError.style.display = "block";
  }
});

    loginPhone.value = "+998 ";
    registerPhone.value = "+998 ";
  </script>
</body>
</html>
